# Valve intervention pipeline configuration
# Chains: camera → yolo_obb → valve_detection

camera: "realsense_d555"

# ── YOLO OBB ────────────────────────────────────────────────────────────────
yolo_obb:
  # Topics
  visualized_image_topic: "/yolo_obb_processed_image"
  detection_topic: "/obb_detections_output"

  # Model and engine file paths (relative to perception_setup/models/)
  model_file_path: "obb_best.onnx"
  engine_file_path: "obb_best.engine"

  # Visualizer
  enable_visualizer: true
  class_names:
    0: "valve"

  encoding_desired: "rgb8"

  # TensorRT
  verbose: true
  force_engine_update: false

  # Tensor I/O bindings
  input_tensor_names: ["input_tensor"]
  input_binding_names: ["images"]
  output_tensor_names: ["output_tensor"]
  output_binding_names: ["output0"]

  # Network input resolution (must match the model's expected input)
  network_image_width: 640
  network_image_height: 640
  image_mean: [0.0, 0.0, 0.0]
  image_stddev: [1.0, 1.0, 1.0]

  # OBB Decoder
  confidence_threshold: 0.25
  num_detections: 300

# ── Valve Detection ─────────────────────────────────────────────────────────
valve_detection:
  # Inputs — detections and depth topics wired automatically from yolo_obb / cameras.yaml
  color_image_info_topic: "/yolo_obb_encoder/internal/resize/camera_info"

  # Depth-to-color extrinsic (looked up from /tf_static)
  depth_frame_id: "front_camera_depth_optical"
  color_frame_id: "front_camera_color_optical"

  # Output
  landmarks_pub_topic: "/valve_landmarks"

  # YOLO letterbox reference size
  yolo_img_width: 640
  yolo_img_height: 640

  # Annulus and plane fit
  annulus_radius_ratio: 0.8
  plane_ransac_threshold: 0.01
  plane_ransac_max_iterations: 50

  # Duplicate-detection suppression
  iou_duplicate_threshold: 0.5

  # Pose offset
  valve_handle_offset: 0.065

  # Output frame
  output_frame_id: "front_camera_depth_optical"
  drone: "nautilus"

  # Behaviour toggles
  debug_visualize: false

  # Debug visualization (only active when debug_visualize: true)
  debug:
    valve_poses_pub_topic: "/valve_poses"
    depth_cloud_pub_topic: "/valve_depth_cloud"
    depth_colormap_pub_topic: "/valve_detection_depth_colormap"
    depth_colormap_value_min: 0.1
    depth_colormap_value_max: 1125.5
    annulus_pub_topic: "/bbx_annulus_pcl"
    plane_pub_topic: "/annulus_plane_pcl"
