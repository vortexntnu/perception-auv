# Visual inspection pipeline: camera -> image_filtering -> aruco_detector
#
# camera:  Key from cameras.yaml — determines which camera driver to launch
#          and which image/camera_info topics to feed into the pipeline.

camera: "sim_front_camera"

# ---------------------------------------------------------------------------
# Image filtering
# sub_topic is resolved automatically from cameras.yaml (based on enable_undistort flag)
# ---------------------------------------------------------------------------
image_filtering:
  pub_topic: "/filtered_image"
  input_encoding: "rgb8"
  output_encoding: "rgb8"

  filter_params:
    filter_type: "remove_grid"
    flip:
      flip_code: 1
    unsharpening:
      blur_size: 8
    erosion:
      size: 1
    dilation:
      size: 3
    white_balancing:
      contrast_percentage: 10.0
    ebus:
      erosion_size: 2
      blur_size: 30
      mask_weight: 5
    otsu:
      gsc_weight_r: 1.0  # Grayscale red weight
      gsc_weight_g: 0.0  # Grayscale green weight
      gsc_weight_b: 0.0   # Grayscale blue weight
      gamma_auto_correction: true
      gamma_auto_correction_weight: 4.0
      otsu_segmentation: true
      erosion_size: 2
      dilation_size: 2
    remove_grid:
      threshold_green: 0.5
      threshold_binary: 30.0
      inpaint_radius: 1.0
      rotation: 0
      height: 400
      width: 400
    overlap:
      percentage_threshold: 20.0 # Percentage (0-100) to cap the pixel intensity difference
    median_binary: # finds the median of each n x n square around each pixel
      kernel_size: 3 # must be odd > 1
      threshold: 100 # [0, 255]
      invert: false
    binary:
      threshold: 20. # in percent
      maxval: 255.
      invert: true
    temporal_noise:
      median_kernel_size: 3
      power_law_weight: 4.0 # Weight for the gamma function
      erotion_size: 2
      dilation_size: 4
      canny_high: 90 # upper weight for canny edge detection
      canny_low: 30 # lower weight  ---------- || ----------
      edge_protection_radius: 2 # Radius for protecting edges


# ---------------------------------------------------------------------------
# ArUco detector
# subs.image_topic is wired automatically to image_filtering.pub_topic
# subs.camera_info_topic is resolved automatically from cameras.yaml
# ---------------------------------------------------------------------------
aruco_detector:
  pubs:
    aruco_image: "/visual_inspection/aruco/image"
    aruco_poses: "/visual_inspection/aruco/markers"
    board_pose: "/visual_inspection/aruco/board"
    landmarks: "/visual_inspection/aruco/landmarks"

  logger_service_name: "/toggle_marker_logger"

  detect_board: false
  visualize: true
  log_markers: false
  publish_detections: true
  publish_landmarks: false

  aruco:
    marker_size: 0.150
    dictionary: "DICT_ARUCO_ORIGINAL"

  board:
    xDist: 0.430
    yDist: 0.830
    ids: [28, 7, 96, 19]
