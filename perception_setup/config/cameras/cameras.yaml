# Centralized camera definitions
# Referenced by pipeline/YOLO/image-processing configs via "camera: <name>"
#
# raw_*:        Topics published directly by the camera driver (input to image processing)
# image_topic / camera_info_topic:  Processed topics (output of image_undistort / image_crop)
#               — downstream nodes (YOLO, pipelines) subscribe to these

realsense_d555:
  # Raw topics from the camera driver
  raw_image_topic: "/camera/camera/color/image_raw"
  raw_camera_info_topic: "/camera/camera/color/camera_info"
  raw_depth_topic: "/camera/camera/depth/image_rect_raw"
  raw_depth_camera_info_topic: "/camera/camera/depth/camera_info"

  # Calibration camera info (published by camera_info_publisher, contains distortion coefficients)
  calibration_camera_info_topic: "/camera/camera/color_raw/camera_info"
  # Path to the calibration YAML (relative to perception_setup/config/cameras/).
  # Used by pipeline launch files to start the camera_info_publisher when use_rosbag is true.
  calibration_file: "color_realsense_d555_calib.yaml"

  # When true, skip launching the camera driver and subscribe directly to the
  # raw topics (e.g. when replaying a rosbag).
  use_rosbag: true

  # Image processing flags
  enable_undistort: true
  enable_crop: true

  # Processed topics (output of image_undistort / image_crop)
  image_topic: "/realsense_d555/color/image"
  camera_info_topic: "/realsense_d555/color/camera_info"
  depth_image_topic: "/realsense_d555/depth/image"
  depth_camera_info_topic: "/realsense_d555/depth/camera_info"

  # TF frame IDs (without drone prefix — prepended at runtime)
  color_frame_id: "front_camera_color_optical"
  depth_frame_id: "front_camera_depth_optical"

  # Image properties
  image_width: 896
  image_height: 504
  encoding: "rgb8"

bfs_pge_16s2c:
  # Raw topics from spinnaker_camera_driver (node name: bfs_pge_16s2c)
  raw_image_topic: "/bfs_pge_16s2c/image_raw"
  raw_camera_info_topic: "/bfs_pge_16s2c/camera_info"

  # Driver publishes calibrated camera_info directly via camerainfo_url — no separate publisher needed.
  calibration_camera_info_topic: "/bfs_pge_16s2c/camera_info"

  # When true, skip launching the camera driver and subscribe directly to the
  # raw topics (e.g. when replaying a rosbag).
  use_rosbag: false

  # Image processing flags
  enable_undistort: false
  enable_crop: false

  # Processed topics (output of image_undistort / image_crop)
  image_topic: "/bfs_pge_16s2c/color/image"
  camera_info_topic: "/bfs_pge_16s2c/color/camera_info"

  # TF frame IDs (without drone prefix — prepended at runtime)
  color_frame_id: "bfs_pge_16s2c_color_optical"

  # Image properties (720x540 after 2x binning from 1440x1080)
  image_width: 720
  image_height: 540
  encoding: "bgr8"

# ── Simulator cameras ───────────────────────────────────────────────────────

sim_front_camera:
  # Topics from the simulator (prefixed with robot namespace at runtime)
  raw_image_topic: "/nautilus/front_camera/image_color"
  raw_camera_info_topic: "/nautilus/front_camera/camera_info"
  raw_depth_topic: "/nautilus/depth_camera/image_depth"
  raw_depth_camera_info_topic: "/nautilus/depth_camera/camera_info"

  # No physical camera driver to launch
  use_rosbag: true

  # Simulator images are already undistorted
  enable_undistort: false
  enable_crop: false

  # Raw and processed topics are the same (no processing needed)
  image_topic: "/nautilus/front_camera/image_color"
  camera_info_topic: "/nautilus/front_camera/camera_info"
  depth_image_topic: "/nautilus/depth_camera/image_depth"
  depth_camera_info_topic: "/nautilus/depth_camera/camera_info"

  # TF frame IDs (without drone prefix — prepended at runtime)
  color_frame_id: "front_camera_color_optical"
  depth_frame_id: "front_camera_depth_optical"

  # Image properties
  image_width: 1920
  image_height: 1080
  encoding: "rgb8"

sim_down_camera:
  # Topics from the simulator
  raw_image_topic: "/nautilus/down_camera/image_color"
  raw_camera_info_topic: "/nautilus/down_camera/camera_info"

  # No physical camera driver to launch
  use_rosbag: true

  # Simulator images are already undistorted
  enable_undistort: false
  enable_crop: false

  # Raw and processed topics are the same
  image_topic: "/nautilus/down_camera/image_color"
  camera_info_topic: "/nautilus/down_camera/camera_info"

  # TF frame IDs (without drone prefix — prepended at runtime)
  color_frame_id: "down_camera_color_optical"

  # Image properties
  image_width: 1440
  image_height: 1080
  encoding: "rgb8"
