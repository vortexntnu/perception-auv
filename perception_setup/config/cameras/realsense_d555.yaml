depth_module.emitter_enabled: false # Toggle emitter used for depth image (we dont want it underwater)

enable_color: true
rgb_camera.color_profile: '896,504,15'
rgb_camera.color_format: 'RGB8'
rgb_camera.enable_auto_exposure: true

enable_depth: true
depth_module.depth_profile: '896,504,15'
depth_module.depth_format: 'Z16'
depth_module.enable_auto_exposure: 'true'

enable_infra1: false
enable_infra2: false
depth_module.infra1_format: 'Y8'
depth_module.infra2_format: 'Y8'

camera_namespace: 'moby' # Does nothing?
camera_name: 'front_camera'
tf_prefix: 'moby/'

enable_gyro: false # Dont need IMU data (not being used)
enable_accel: false # Dont need IMU data (not being used)
enable_motion: false # Dont need IMU data (not being used)

publish_tf: false # Publishes with wrong convention for ROS (z-frame for camera/optical frame)

