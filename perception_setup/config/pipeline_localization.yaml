# Pipeline-localization: Dual-camera segmentation
# Runs two segmentation pipelines on different camera streams.

seg_front:
  camera: "cam_front"
  visualized_image_topic: "/localization/front/segmentation_debug"
  detection_topic: "/localization/front/detections"
  mask_topic: "/localization/front/segmentation_mask"

  model_file_path: "down_cam_seg.onnx"
  engine_file_path: "down_cam_seg.engine"

  enable_visualizer: true
  class_names:
    0: "pipeline"

  encoding_desired: "rgb8"

  output_mask_width: 640
  output_mask_height: 640

  verbose: true
  force_engine_update: false

  # ==============================================================================================================================================================
  # NOTE: Below wont change unless you change the model architecture or input/output tensor names, so no need to update these if you just swap in a different segmentation model
  # ==============================================================================================================================================================

  input_tensor_names: ["input_tensor"]
  input_binding_names: ["images"]
  output_tensor_names: ["output_tensor", "mask_tensor"]
  output_binding_names: ["output0", "output1"]

  network_image_width: 640
  network_image_height: 640
  image_mean: [0.0, 0.0, 0.0]
  image_stddev: [1.0, 1.0, 1.0]

  confidence_threshold: 0.25
  num_detections: 300
  mask_width: 160
  mask_height: 160
  num_protos: 32

seg_down:
  camera: "cam_down"
  visualized_image_topic: "/localization/down/segmentation_debug"
  detection_topic: "/localization/down/detections"
  mask_topic: "/localization/down/segmentation_mask"

  model_file_path: "down_cam_seg.onnx"
  engine_file_path: "down_cam_seg.engine"

  enable_visualizer: true
  class_names:
    0: "pipeline"

  encoding_desired: "rgb8"

  output_mask_width: 640
  output_mask_height: 640

  verbose: true
  force_engine_update: false

  # ==============================================================================================================================================================
  # NOTE: Below wont change unless you change the model architecture or input/output tensor names, so no need to update these if you just swap in a different model
  # ==============================================================================================================================================================

  input_tensor_names: ["input_tensor"]
  input_binding_names: ["images"]
  output_tensor_names: ["output_tensor", "mask_tensor"]
  output_binding_names: ["output0", "output1"]

  network_image_width: 640
  network_image_height: 640
  image_mean: [0.0, 0.0, 0.0]
  image_stddev: [1.0, 1.0, 1.0]

  confidence_threshold: 0.25
  num_detections: 300
  mask_width: 160
  mask_height: 160
  num_protos: 32
