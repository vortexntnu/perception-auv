# Image crop configuration
# Reads raw depth image from camera and crops to the specified region.
# Topics are resolved from cameras.yaml based on the camera reference.
#
# crop: top-left corner (x_offset, y_offset) and size (width, height) in pixels
#       Set width or height to 0 to use the full image dimension.

camera: "realsense_d555"

crop: # These values were eye-balled from the raw depth image.
  x_offset: 260  # x_left boundary
  y_offset: 190  # y_upper boundary
  width: 485     # x_right (730) - x_left (245)
  height: 245    # y_lower (435) - y_upper (190)
