# Camera source (resolved from cameras.yaml)
camera: "realsense_d555"

# Topics
visualized_image_topic: "/yolo_seg_processed_image"
detection_topic: "/seg_detections_output"
mask_topic: "/yolo_seg_mask"

# Model and engine file paths (relative to perception_setup/models/)
model_file_path: "down_cam_seg.onnx"
engine_file_path: "down_cam_seg.engine"

# Visualizer
enable_visualizer: true
class_names:
  0: "pipeline"

encoding_desired: "rgb8"

# Output mask resolution (upscaled from 160x160 via bilinear interpolation)
output_mask_width: 640 # Set to 640 to match the network input size, which allows you to use its camera info directly
output_mask_height: 640 # Set to 640 to match the network input size, which allows you to use its camera info directly

# TensorRT
verbose: true
force_engine_update: false

# ==============================================================================================================================================================
# NOTE: Below won't change unless you change the model architecture or input/output tensor names, so no need to update these if you just swap in a different model
# ==============================================================================================================================================================

# Tensor I/O bindings
# Segmentation model with embedded NMS; two outputs:
#   output0: [1, 300, 38]  detections with 32 mask coefficients
#   output1: [1, 32, 160, 160]  prototype masks
input_tensor_names: ["input_tensor"]
input_binding_names: ["images"]
output_tensor_names: ["output_tensor", "mask_tensor"]
output_binding_names: ["output0", "output1"]

# Network input resolution (must match the model's expected input size)
network_image_width: 640
network_image_height: 640
image_mean: [0.0, 0.0, 0.0]
image_stddev: [1.0, 1.0, 1.0]

# Segmentation Decoder
# NMS is embedded in the model export - only confidence filtering is applied.
confidence_threshold: 0.25
# Must match the inner-batch dim of output0 [1, num_detections, 38]
num_detections: 300
# Prototype mask dimensions from output1 [1, num_protos, mask_height, mask_width]
mask_width: 160
mask_height: 160
num_protos: 32
